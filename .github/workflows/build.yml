name: Build APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: rtsp-droid-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Build release APK
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        env:
          MY_PRIVATE_EMAIL: ${{ secrets.KEY_ALIAS }}
          mystorepass: ${{ secrets.STORE_PASSWORD }}
          mystorepass2: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/keystore.jks
          sed -i 's|file("D:\\\\imoe.jks")|file("keystore.jks")|' app/build.gradle.kts
          ./gradlew assembleRelease

      - name: Upload release APK
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: rtsp-droid-release
          path: app/build/outputs/apk/release/*.apk
